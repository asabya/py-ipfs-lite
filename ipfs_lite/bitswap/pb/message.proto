syntax = "proto3";

package ipfs_lite.bitswap;

message Message {
  message Wantlist {
    message Entry {
      bytes block = 1;
      int32 priority = 2;
      bool cancel = 3;
      enum WantType {
        Block = 0;
        Have = 1;
      }
      WantType wantType = 4;
      bool sendDontHave = 5;
    }
    repeated Entry entries = 1;
    bool full = 2;
  }

  message Block {
    bytes prefix = 1;
    bytes data = 2;
  }

  enum BlockPresenceType {
    Have = 0;
    DontHave = 1;
  }

  message BlockPresence {
    bytes cid = 1;
    BlockPresenceType type = 2;
  }

  Wantlist wantlist = 1;
  repeated Block payload = 3;
  repeated BlockPresence blockPresences = 4;
}

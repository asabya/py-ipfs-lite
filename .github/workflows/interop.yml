name: Interop Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  interop:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv sync

      - name: Run interop tests
        run: bash interop/run_interop.sh
